name: PR Preview (EAS Update)

on:
  pull_request_target:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to build preview for"
        required: true
        type: number

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Add EXPO_TOKEN to repo secrets: Settings > Secrets > Actions"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number || github.event.inputs.pr_number }}/head

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        env:
          EXPO_USE_BUN: "1"
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          expo-version: latest
          eas-version: latest
          packager: bun
          eas-cache: true

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-bun-1.3.8-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node-modules-bun-1.3.8-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Create preview
        id: preview
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto --branch pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          comment: ${{ github.event_name == 'pull_request' }}

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_LINK: ${{ steps.preview.outputs.link }}
          QR_LINK: ${{ steps.preview.outputs.qr }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          TRIGGER_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'manual trigger' || 'auto' }}
        run: |
          gh pr comment $PR_NUMBER --body "**Preview**

          ![QR Code]($QR_LINK)

          - [Update]($UPDATE_LINK)"
